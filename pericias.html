<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perícias | INFRAJUS</title>
  
  <style>
    body {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #050d1a;
      color: #d8c7a3;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; text-align: center;
      overflow-x: hidden; position: relative;
    }

    /* Navegação */
    nav {
      position: relative; z-index: 2;
      padding: 20px; width: 100%;
      display: flex; justify-content: center; gap: 20px;
    }
    .nav-btn {
      color: #cbb38a; text-decoration: none; 
      text-transform: uppercase; font-size: 11px; 
      letter-spacing: 1px; border: 1px solid #cbb38a;
      padding: 6px 12px; border-radius: 4px;
      transition: 0.3s;
    }
    .nav-btn:hover { background: #cbb38a; color: #050d1a; }

    /* Fundo forense (mantendo a atmosfera) */
    .forensic-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .fingerprint-img {
      position: absolute; width: 120px;
      opacity: 0.06;
    }
    .fp1 { top: 5%; left: 5%; }
    .fp2 { bottom: 5%; right: 5%; }

    /* Conteúdo */
    .content-wrapper {
      max-width: 800px; padding: 40px 20px;
      position: relative; z-index: 1;
    }
    h1 { color: #cbb38a; letter-spacing: 2px; margin-bottom: 40px; }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      border: 1px solid #cbb38a;
      padding: 20px;
      transition: 0.3s;
      background: rgba(11, 26, 42, 0.7);
    }
    .card:hover { background: #cbb38a; color: #050d1a; }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="nav-btn">Início</a>
    <a href="pericias.html" class="nav-btn">Perícias</a>
    <a href="investigacoes.html" class="nav-btn">Investigações</a>
    <a href="faq.html" class="nav-btn">Dúvidas</a>
  </nav>

  <div class="forensic-layer">
    <img src="1000533655-removebg-preview.png" class="fingerprint-img fp1" alt="Digital 1">
    <img src="1000533656-removebg-preview.png" class="fingerprint-img fp2" alt="Digital 2">
  </div>

  <div class="content-wrapper">
    <h1>Nossas Perícias</h1>
    
    <div class="grid-container">
        <div class="card">Perícia Criminal Particular</div>
        <div class="card">Assistência Técnica Judicial</div>
        <div class="card">Parecer Técnico</div>
        <div class="card">Perícia em Acidentes de Trânsito</div>
        <div class="card">Perícia em Vídeos e Imagens</div>
        <div class="card">Perícia em Áudios</div>
        <div class="card">Perícia Digital</div>
    </div>
  </div>

</body>
</html>
