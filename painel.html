<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestão de Perícias | INFRAJUS</title>
  <style>
    body { background-color: #050d1a; color: #d8c7a3; font-family: sans-serif; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #cbb38a; padding-bottom: 10px; margin-bottom: 20px; }
    h1 { color: #cbb38a; text-transform: uppercase; font-size: 22px; }
    
    .stats { display: flex; gap: 20px; margin-bottom: 20px; }
    .card { border: 1px solid #cbb38a; padding: 15px; flex: 1; text-align: center; background: #0a1628; }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border-bottom: 1px solid #333; padding: 15px; text-align: left; }
    th { color: #cbb38a; }
    
    .status-pendente { color: #e67e22; font-weight: bold; }
    .btn-acao { background: #cbb38a; border: none; padding: 8px 12px; cursor: pointer; color: #050d1a; border-radius: 4px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Painel de Controle INFRAJUS</h1>
    <button onclick="window.location.href='login.html'">SAIR</button>
  </div>

  <div class="stats">
    <div class="card"><strong>TOTAL:</strong> 05</div>
    <div class="card"><strong>PENDENTES:</strong> 03</div>
    <div class="card"><strong>FINALIZADAS:</strong> 02</div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Protocolo</th>
        <th>Interessado</th>
        <th>Data</th>
        <th>Status</th>
        <th>Ação</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>INF-9928374-X</td>
        <td>Cliente Teste 01</td>
        <td>03/06/2026</td>
        <td class="status-pendente">Análise</td>
        <td><button class="btn-acao">VER DETALHES</button></td>
      </tr>
    </tbody>
  </table>

</body>
</html>
