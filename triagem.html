  <!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Triagem | INFRAJUS</title>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #050d1a;
      color: #d8c7a3;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
      position: relative;
    }

    /* Fundo Forense */
    .forensic-layer {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .fingerprint-img {
      position: absolute; width: 120px; opacity: 0.06;
    }
    .fp1 { top: 5%; left: 5%; }
    .fp2 { bottom: 5%; right: 5%; }

    /* Container do Formulário */
    .form-wrapper { 
      width: 90%; max-width: 400px;
      z-index: 1;
      padding: 30px;
      background: rgba(5, 13, 26, 0.8); /* Fundo escuro leve */
      border: 1px solid #cbb38a;
      border-radius: 8px;
    }

    h2 { 
      color: #cbb38a; text-align: center; 
      margin-bottom: 25px; letter-spacing: 2px;
      text-transform: uppercase; font-size: 18px;
    }
    
    label { display: block; margin-bottom: 5px; font-size: 13px; color: #d8c7a3; }
    
    input, textarea {
      width: 100%; padding: 12px; margin-bottom: 15px;
      background: rgba(203, 179, 138, 0.05);
      border: 1px solid #cbb38a;
      color: #fff; border-radius: 4px; box-sizing: border-box;
    }
    
    button {
      width: 100%; padding: 12px;
      background: transparent; color: #cbb38a;
      border: 1px solid #cbb38a; cursor: pointer;
      font-size: 14px; border-radius: 4px; 
      text-transform: uppercase; margin-top: 10px;
    }
    button:hover { background: #cbb38a; color: #050d1a; }
  </style>
</head>
<body>

  <div class="forensic-layer">
    <img src="1000533655-removebg-preview.png" class="fingerprint-img fp1" alt="Digital 1">
    <img src="1000533656-removebg-preview.png" class="fingerprint-img fp2" alt="Digital 2">
  </div>

  <div class="form-wrapper">
    <h2>TRIAGEM PERICIAL</h2>
    <form>
      <label>Nome do Interessado / Referência</label>
      <input type="text" placeholder="Nome ou ID">

      <label>Data aproximada do fato</label>
      <input type="date">

      <label>Narrativa dos Fatos</label>
      <textarea rows="4" placeholder="Descreva o caso..."></textarea>

      <button type="button">GERAR PROTOCOLO</button>
    </form>
  </div>

</body>
</html>
