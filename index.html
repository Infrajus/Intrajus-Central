<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>INFRAJUS | Inteligência Pericial</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #050d1a;
      color: #d8c7a3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 40px;
    }
    h1 {
      color: #cbb38a;
      letter-spacing: 2px;
      font-size: 24px;
      margin-bottom: 20px;
    }
    p {
      font-size: 15px;
      opacity: 0.9;
      line-height: 1.5;
      margin-bottom: 15px;
    }
    img {
      width: 160px;
      height: auto;
      display: block;
      margin: 0 auto 20px auto;
    }
    button {
      margin-top: 20px;
      padding: 12px 30px;
      border: 1px solid #cbb38a;
      background: transparent;
      color: #cbb38a;
      cursor: pointer;
      transition: 0.3s;
      border-radius: 6px;
      font-size: 16px;
    }
    button:hover {
      background: #cbb38a;
      color: #050d1a;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="Screenshot_20260526_004700_Gallery.jpg" alt="Logo INFRAJUS">

    <h1>INFRAJUS INTELIGÊNCIA PERICIAL</h1>

    <p>Inteligência pericial aplicada à análise de fatos, evidências e contextos digitais.</p>

    <p>Um ambiente de triagem e compreensão técnica de situações complexas.</p>

    <button>INICIAR EXPERIÊNCIA</button>
  </div>

</body>
</html>
